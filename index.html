<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>DevTeen Camp | Урок JS</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 
Теми уроку:
- if/else, querySelector, getElementById
- array, object, Object.keys, Object.values
- localStorage
- document.createElement, appendChild
- for (let i ...) цикл
- innerHeight
- setInterval, requestAnimationFrame
- CSS animation, media queries
- валідація email
- FileReader (фото з диску)
-->

<div class="app" id="app">
	<header>
		<h1 class="logo pulse">🚀 DevTeen</h1>
		<!-- setInterval оновлює годинник щосекунди -->
		<span id="clock"></span>
	</header>

	<!-- requestAnimationFrame рухає кульку -->
	<div class="track">
		<div id="ball" class="ball"></div>
	</div>

	<!-- Форми (видимі коли НЕ залогінений) -->
	<div id="authSection">

		<!-- Форма логіну -->
		<div class="card">
			<h2>Вхід</h2>
			<form id="loginForm">
				<input id="loginEmail" type="text" placeholder="Логін (email)" required>
				<div class="pass-wrap">
					<input id="loginPass" type="password" placeholder="Пароль" required>
					<button type="button" class="eye" onclick="togglePass('loginPass')">👁</button>
				</div>
				<button type="submit" class="btn">Увійти</button>
			</form>
		</div>

		<!-- Форма реєстрації -->
		<div class="card">
			<h2>Реєстрація</h2>
			<form id="regForm">
				<input id="regName" type="text" placeholder="Ім'я" required>
				<input id="regLogin" type="email" placeholder="Email (логін)" required>
				<div class="pass-wrap">
					<input id="regPass" type="password" placeholder="Пароль (мін. 6)" required>
					<button type="button" class="eye" onclick="togglePass('regPass')">👁</button>
				</div>
				<input id="regDob" type="date" required>
				<div class="gender-row">
					<label><input type="radio" name="gender" value="man" checked> Хлопець 👦</label>
					<label><input type="radio" name="gender" value="woman"> Дівчина 👧</label>
				</div>
				<label class="file-label">
					Фото з компʼютера: <input id="regAvatar" type="file" accept="image/*">
				</label>
				<button type="submit" class="btn">Зареєструватися</button>
			</form>
		</div>
	</div>

	<!-- Профіль (видимий коли залогінений) -->
	<div id="profileSection" class="card hidden">
		<h2 id="welcomeText">Привіт!</h2>
		<img id="profileImg" class="avatar hidden" src="" alt="avatar">
		<!-- Object.keys + for i заповнюють цей список -->
		<ul id="profileDetails"></ul>
		<button class="btn btn-red" onclick="logout()">Вийти 🚪</button>
	</div>

	<!-- Список зареєстрованих (createElement + appendChild) -->
	<div class="card">
		<h3>Зареєстровані розробники:</h3>
		<ul id="userList"></ul>
	</div>

	<footer>
		<p id="screenInfo"></p>
		<p>© 2026 DevTeen Camp 💻</p>
	</footer>
</div>

<script src="script.js"></script>
</body>
</html>
